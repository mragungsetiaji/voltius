name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG.md
        id: extract
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v hdr="## [$version]" '
            index($0, hdr) == 1 { flag=1; next }
            flag && /^## / { flag=0 }
            flag { print }
          ' CHANGELOG.md)
          # Trim leading/trailing blank lines
          notes=$(printf '%s\n' "$notes" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)
          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md section found for version $version. Add a '## [$version]' entry before releasing."
            exit 1
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Extracted release notes for $version:"
          printf '%s\n' "$notes"

  publish-tauri:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''

          - platform: 'ubuntu-24.04-arm'
            target: 'aarch64-unknown-linux-gnu'
            args: ''

          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
            args: '--target aarch64-pc-windows-msvc'

          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'

          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Ubuntu native)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Voltius ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          uploadPlainBinary: true
          updaterJsonPreferNsis: true

      - name: Generate checksums
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -type f ! -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            sha256sum "$f" > "$f.sha256"
          done
          echo "=== Checksums ==="
          find . -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            echo "  $f:"
            cat "$f"
          done

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            gh release upload "${{ github.ref_name }}" "$f"
          done
