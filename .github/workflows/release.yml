name: release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.51)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.51)'
        required: true
        type: string

# Needed for the workflow_dispatch entry path, which doesn't inherit the
# caller's token. Overrides a "read" default_workflow_permissions so the
# release jobs can create/edit the GitHub release.
permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Extract release notes from CHANGELOG.md
        id: extract
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          notes=$(awk -v hdr="## [$version]" '
            index($0, hdr) == 1 { flag=1; next }
            flag && /^## / { flag=0 }
            flag { print }
          ' CHANGELOG.md)
          # Trim leading/trailing blank lines
          notes=$(printf '%s\n' "$notes" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)
          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md section found for version $version. Add a '## [$version]' entry before releasing."
            exit 1
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Extracted release notes for $version:"
          printf '%s\n' "$notes"

  publish-tauri:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Builds run concurrently. The shared-file race that forced serialization
      # is gone: each job sets includeUpdaterJson:false (below), so no job touches
      # latest.json. Per-platform installers + .sig files have unique names and
      # never collide. The updater-manifest job assembles latest.json once, after
      # all builds — single writer, no race.
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''

          - platform: 'ubuntu-24.04-arm'
            target: 'aarch64-unknown-linux-gnu'
            args: ''

          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
            args: '--target aarch64-pc-windows-msvc'

          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'

          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Read toolchain channel from rust-toolchain.toml
        id: rust
        shell: bash
        run: echo "channel=$(sed -nE 's/^channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Ubuntu native)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev xdg-utils

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install sccache
        uses: mozilla/sccache-action@v0.0.10

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Voltius ${{ inputs.tag }}'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          uploadPlainBinary: true
          updaterJsonPreferNsis: true
          # Don't write latest.json here — concurrent jobs would race on the
          # shared file. The .sig files still upload as bundle artifacts; the
          # updater-manifest job builds latest.json from them once all builds
          # finish.
          includeUpdaterJson: false

  # Experimental Android build — sideload APK, not Play Store. Release-signed
  # arm64-v8a only (covers ~all modern phones). tauri-action's `mobile: android`
  # input is unreleased (default branch only; not in @v0 or any tag), so we don't
  # rely on it — we set up the toolchain + signing, run `tauri android build`
  # directly, and upload the APK to the same draft release publish-tauri created.
  publish-android:
    # Runs after publish-tauri so the draft release already exists — avoids two
    # jobs racing to create the same draft.
    needs: [changelog, publish-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Read toolchain channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(sed -nE 's/^channel[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: aarch64-linux-android
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/voltius-release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/voltius-release.keystore" >> "$GITHUB_ENV"

      # The pinned tauri-action@v0 has no `mobile` input (Android support is
      # unreleased, default branch only), so it ignored `mobile: android` and ran
      # `tauri build --apk` — but `--apk` is only valid on `tauri android build`.
      # Build the signed APK directly and upload it to the draft release.
      - name: Build Android APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm tauri android build --apk --target aarch64

      - name: Upload APK to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          src="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          dest="Voltius_${TAG#v}_aarch64.apk"
          cp "$src" "$dest"
          gh release upload "$TAG" "$dest" --clobber -R "$REPO"

  # Single-writer assembly of latest.json. Each build job skipped it
  # (uploadUpdaterJson:false) to avoid racing on the shared file; here we
  # download every .sig from the draft release and rebuild the manifest once,
  # reproducing exactly the key scheme tauri-action emits (bare default key per
  # OS + per-installer-type variants). Uploaded with --clobber.
  updater-manifest:
    needs: [changelog, publish-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
          NOTES: ${{ needs.changelog.outputs.notes }}
        run: |
          mkdir -p sigs
          gh release download "$TAG" -R "$REPO" -p '*.sig' -D sigs
          python3 - <<'PY'
          import json, os, glob, datetime

          tag = os.environ["TAG"]
          version = tag.lstrip("v")
          notes = os.environ["NOTES"]
          repo = os.environ["REPO"]
          base = f"https://github.com/{repo}/releases/download/{tag}/"

          # Bare "{os}-{arch}" alias points at this installer type per OS.
          DEFAULT = {"linux": "appimage", "windows": "nsis", "darwin": "app"}

          def classify(name):
              if name.endswith(".AppImage"):
                  return "linux", ("x86_64" if "amd64" in name else "aarch64"), "appimage"
              if name.endswith(".deb"):
                  return "linux", ("x86_64" if "amd64" in name else "aarch64"), "deb"
              if name.endswith(".rpm"):
                  return "linux", ("x86_64" if "x86_64" in name else "aarch64"), "rpm"
              if name.endswith("-setup.exe"):
                  return "windows", ("x86_64" if "x64" in name else "aarch64"), "nsis"
              if name.endswith(".msi"):
                  return "windows", ("x86_64" if "x64" in name else "aarch64"), "msi"
              if name.endswith(".app.tar.gz"):
                  return "darwin", ("x86_64" if "x64" in name else "aarch64"), "app"
              return None

          platforms = {}
          for sig in sorted(glob.glob("sigs/*.sig")):
              asset = os.path.basename(sig)[:-4]  # strip .sig
              c = classify(asset)
              if not c:
                  continue
              o, arch, t = c
              with open(sig) as f:
                  entry = {"signature": f.read().strip(), "url": base + asset}
              platforms[f"{o}-{arch}-{t}"] = entry
              if DEFAULT[o] == t:
                  platforms[f"{o}-{arch}"] = entry

          if not platforms:
              raise SystemExit("No updater .sig files found — refusing to write empty latest.json")

          manifest = {
              "version": version,
              "notes": notes,
              "pub_date": datetime.datetime.now(datetime.timezone.utc)
                  .isoformat(timespec="milliseconds").replace("+00:00", "Z"),
              "platforms": platforms,
          }
          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          PY
          gh release upload "$TAG" latest.json -R "$REPO" --clobber

  checksums:
    needs: [publish-tauri, publish-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets && cd assets
          gh release download "${{ inputs.tag }}" -R "${{ github.repository }}"
          # Checksum only the distributable artifacts — skip signatures,
          # the updater manifest, and existing checksums.
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sha256|*.sig|latest.json) continue ;; esac
            sha256sum "$f" > "$f.sha256"
          done
          echo "=== Checksums ==="
          cat *.sha256
          gh release upload "${{ inputs.tag }}" *.sha256 -R "${{ github.repository }}" --clobber

  publish-release:
    needs: [checksums, updater-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.tag }}" --draft=false --latest -R "${{ github.repository }}"
