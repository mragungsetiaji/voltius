name: release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.51)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.51)'
        required: true
        type: string

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Extract release notes from CHANGELOG.md
        id: extract
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          notes=$(awk -v hdr="## [$version]" '
            index($0, hdr) == 1 { flag=1; next }
            flag && /^## / { flag=0 }
            flag { print }
          ' CHANGELOG.md)
          # Trim leading/trailing blank lines
          notes=$(printf '%s\n' "$notes" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)
          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md section found for version $version. Add a '## [$version]' entry before releasing."
            exit 1
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Extracted release notes for $version:"
          printf '%s\n' "$notes"

  publish-tauri:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serialize the matrix: tauri-action's updater-manifest upload is a
      # non-atomic read-merge-upload of the shared latest.json. Running jobs
      # concurrently races — two jobs read latest.json before either writes,
      # so the second loses (or fails with ReleaseAsset already_exists). One
      # job at a time guarantees every platform lands in latest.json.
      max-parallel: 1
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''

          - platform: 'ubuntu-24.04-arm'
            target: 'aarch64-unknown-linux-gnu'
            args: ''

          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
            args: '--target aarch64-pc-windows-msvc'

          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'

          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Read toolchain channel from rust-toolchain.toml
        id: rust
        shell: bash
        run: echo "channel=$(sed -nE 's/^channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Ubuntu native)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev xdg-utils

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Voltius ${{ inputs.tag }}'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          uploadPlainBinary: true
          updaterJsonPreferNsis: true

  # Experimental Android build — sideload APK, not Play Store. Release-signed
  # arm64-v8a only (covers ~all modern phones). tauri-action builds the APK and
  # uploads it to the same draft release; the toolchain + signing are set up here
  # since tauri-action provides neither.
  publish-android:
    # Runs after publish-tauri so the draft release already exists — avoids two
    # jobs racing to create the same draft.
    needs: [changelog, publish-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Read toolchain channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(sed -nE 's/^channel[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: aarch64-linux-android
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/voltius-release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/voltius-release.keystore" >> "$GITHUB_ENV"

      - name: Build and Release Android APK
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Voltius ${{ inputs.tag }}'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          mobile: android
          args: '--apk --target aarch64'

  checksums:
    needs: [publish-tauri, publish-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets && cd assets
          gh release download "${{ inputs.tag }}" -R "${{ github.repository }}"
          # Checksum only the distributable artifacts — skip signatures,
          # the updater manifest, and existing checksums.
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sha256|*.sig|latest.json) continue ;; esac
            sha256sum "$f" > "$f.sha256"
          done
          echo "=== Checksums ==="
          cat *.sha256
          gh release upload "${{ inputs.tag }}" *.sha256 -R "${{ github.repository }}" --clobber

  publish-release:
    needs: checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.tag }}" --draft=false --latest -R "${{ github.repository }}"
