# TEMPORARY feature-branch firing of the winget bootstrap — opens the initial
# microsoft/winget-pkgs PR using the real WINGET_PKGS_TOKEN. Runs once; komac's
# duplicate-PR check makes re-runs safe. DELETE before merging to main.
name: _winget-bootstrap-fire
on:
  push:
    branches: [feat/macos-windows-installs]
    paths:
      - .github/workflows/_winget-bootstrap-fire.yml
jobs:
  fire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: komac new (bootstrap)
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          GH_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          TAG: v0.4.0
        run: bash scripts/bootstrap-winget.sh
