name: tag-release

on:
  push:
    branches: [main]

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT so the pushed tag triggers release.yml (GITHUB_TOKEN-pushed tags don't).
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version
        id: version
        run: echo "v=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")" >> $GITHUB_OUTPUT

      - name: Create tag if new version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.v }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG"
